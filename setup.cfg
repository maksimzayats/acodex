[flake8]
format = wemake
show-source = true
statistics = false
doctests = true

max-complexity = 6
max-line-length = 100
max-imports = 25
max-arguments = 6
max-module-members = 12
max-methods = 12
max-local-variables = 12
max-line-complexity = 18
max-try-body-length = 2
max-except-exceptions = 4
max-raises = 4
max-annotation-complexity = 4
max-string-usages = 5

allowed-domain-names =
  data,
  handler,
  item,
  items,
  params,
  result,
  value

select = WPS,E999
ignore =
  # Explicit public re-export declarations.
  WPS410
  # Package facades intentionally re-export public compatibility APIs.
  WPS412

extend-exclude =
  .venv
  .git
  .mypy_cache
  .pytest_cache
  .ruff_cache
  build
  dist
  references
  tmp

per-file-ignores =
  tests/*.py: WPS110, WPS118, WPS202, WPS204, WPS211, WPS213, WPS214, WPS218, WPS219, WPS226, WPS234, WPS235, WPS237, WPS243, WPS301, WPS317, WPS322, WPS324, WPS335, WPS342, WPS358, WPS420, WPS430, WPS431, WPS432, WPS437, WPS441, WPS442, WPS458, WPS462, WPS476, WPS520, WPS601
